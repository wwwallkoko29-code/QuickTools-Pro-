<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer - QuickTools Pro</title>
<meta name="description" content="Set a timer online quickly and easily. Free online timer tool.">
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:20px}
input{width:50%;padding:10px;border-radius:6px;border:none;margin-top:10px;}
button{margin-top:10px;padding:10px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;}
a{color:#3b82f6;display:block;margin:20px;}
</style>
</head>
<body>
<h1>Timer</h1>
<input type="number" id="timeInput" placeholder="Seconds"><br>
<button onclick="startTimer()">Start Timer</button>
<p id="result"></p>

<!-- رابط Home -->
<a href="index.html">Home</a>

<script>
function startTimer(){
let t=parseInt(document.getElementById("timeInput").value);
let r=document.getElementById("result");
if(isNaN(t)||t<=0){r.innerText="Enter a valid number";return;}
let i=setInterval(()=>{
r.innerText="Time left: "+t+" sec";
t--;
if(t<0){clearInterval(i);r.innerText="Done!";}
},1000);
}
</script>
</body>
</html>
