<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accurate Age Calculator - QuickTools Pro</title>
<meta name="description" content="Calculate your exact age with years, months, and days online for free. Accurate age calculator tool.">
<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 30px;
}
input, select {
    padding: 10px;
    border-radius: 6px;
    border: none;
    margin-top: 10px;
}
button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
#result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
}
a {
    color: #3b82f6;
    display: block;
    margin-top: 30px;
    text-decoration: none;
}
</style>
</head>
<body>
<h1>Accurate Age Calculator</h1>
<p>Enter your birth date:</p>

<!-- اختر اليوم والشهر والسنة لتجنب مشاكل اللغة -->
<select id="day">
<option value="">Day</option>
<script>for(let d=1;d<=31;d++){document.write('<option value="'+d+'">'+d+'</option>');}</script>
</select>

<select id="month">
<option value="">Month</option>
<script>
const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
for(let i=0;i<months.length;i++){document.write('<option value="'+i+'">'+months[i]+'</option>');}
</script>
</select>

<select id="year">
<option value="">Year</option>
<script>
let today=new Date();let currentYear=today.getFullYear();
for(let y=currentYear;y>=1900;y--){document.write('<option value="'+y+'">'+y+'</option>');}
</script>
</select><br>

<button onclick="calcAge()">Calculate Age</button>
<p id="result"></p>

<a href="index.html">Home</a>

<script>
function calcAge(){
    let day=parseInt(document.getElementById("day").value);
    let month=parseInt(document.getElementById("month").value);
    let year=parseInt(document.getElementById("year").value);

    if(isNaN(day)||isNaN(month)||isNaN(year)){
        document.getElementById("result").innerText="Enter valid birth date";
        return;
    }

    let birth=new Date(year,month,day);
    let today=new Date();

    let years=today.getFullYear()-birth.getFullYear();
    let months=today.getMonth()-birth.getMonth();
    let days=today.getDate()-birth.getDate();

    if(days<0){
        months-=1;
        let lastMonth=new Date(today.getFullYear(),today.getMonth(),0);
        days+=lastMonth.getDate();
    }

    if(months<0){
        years-=1;
        months+=12;
    }

    document.getElementById("result").innerText=years+" years, "+months+" months, "+days+" days";
}
</script>
</body>
</html>
