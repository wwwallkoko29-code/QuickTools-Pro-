<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator - QuickTools Pro</title>
<meta name="description" content="Calculate your exact age online for free. Fast and easy age calculator tool.">
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:20px}
input{padding:10px;border-radius:6px;border:none;margin-top:10px;}
button{margin-top:10px;padding:10px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;}
a{color:#3b82f6;display:block;margin:20px;}
</style>
</head>
<body>
<h1>Age Calculator</h1>
<input type="date" id="birthdate"><br>
<button onclick="calcAge()">Calculate Age</button>
<p id="result"></p>

<!-- رابط Home -->
<a href="index.html">Home</a>

<script>
function calcAge(){
let b=new Date(document.getElementById("birthdate").value);
let t=new Date();
let age=t.getFullYear()-b.getFullYear();
document.getElementById("result").innerText="Age: "+age;
}
</script>
</body>
</html>
