<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Number Generator - QuickTools Pro</title>
<meta name="description" content="Generate random numbers online instantly. Free random number generator tool.">
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:20px}
input{width:40%;padding:10px;border-radius:6px;border:none;margin-top:10px;}
button{margin-top:10px;padding:10px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;}
a{color:#3b82f6;display:block;margin:20px;}
</style>
</head>
<body>
<h1>Random Number Generator</h1>
<input id="min" type="number" placeholder="Min">
<input id="max" type="number" placeholder="Max"><br>
<button onclick="generate()">Generate</button>
<p id="result"></p>

<!-- رابط Home -->
<a href="index.html">Home</a>

<script>
function generate(){
let min=parseInt(document.getElementById("min").value);
let max=parseInt(document.getElementById("max").value);
if(isNaN(min)||isNaN(max)||min>max){document.getElementById("result").innerText="Enter valid numbers";return;}
document.getElementById("result").innerText="Random Number: "+(Math.floor(Math.random()*(max-min+1))+min);
}
</script>
</body>
</html>
