<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator - QuickTools Pro</title>
<meta name="description" content="Generate strong passwords online for free. Easy and fast password generator tool.">
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:20px}
input{width:60%;padding:10px;border-radius:6px;border:none;margin-top:10px;}
button{margin-top:10px;padding:10px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;}
a{color:#3b82f6;display:block;margin:20px;}
</style>
</head>
<body>
<h1>Password Generator</h1>
<button onclick="generate()">Generate Password</button><br>
<input id="output" readonly><br>

<!-- رابط Home -->
<a href="index.html">Home</a>

<script>
function generate(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
let pass="";
for(let i=0;i<12;i++){pass+=chars[Math.floor(Math.random()*chars.length)];}
document.getElementById("output").value=pass;
}
</script>
</body>
</html>
